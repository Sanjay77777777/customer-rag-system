# ---------------------------------------------------------------------------
# NGINX PRODUCTION CONFIGURATION
# ---------------------------------------------------------------------------
# This config is used when the frontend is deployed via Docker (nginx:alpine).
#
# It serves the built React app (static files) and proxies /api/* requests
# to the FastAPI backend running on the host machine.
#
# host.docker.internal resolves to the Windows/macOS host from inside the
# Docker container, reaching the backend container's published port 8000.

server {
    # Listen on port 80 inside the container (mapped to host port 3000 by compose)
    listen 80;

    # Serve static files from the built React app
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* requests to the FastAPI backend
    location /api/ {
        # Strip /api prefix so backend receives /customers, not /api/customers
        proxy_pass http://host.docker.internal:8000/;
        proxy_set_header Host $host;
    }

    # For all other routes, serve index.html (SPA fallback)
    # This lets React Router handle client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
