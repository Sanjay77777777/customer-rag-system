#version: "3.9"

services:
  backend:
    image: customer-rag-api
    container_name: customer-rag-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env

  frontend:
    image: customer-rag-ui
    container_name: customer-rag-ui
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
